name: Deploy GoAgent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build for ARM64
        run: |
          GOOS=linux GOARCH=arm64 go build -o goagent-linux .
        working-directory: .

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          source: goagent-linux
          target: /home/ubuntu/deploy/

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mv /home/ubuntu/deploy/goagent-linux /opt/goagent/goagent-linux
            sudo chmod +x /opt/goagent/goagent-linux
            sudo systemctl restart goagent
            echo "✅ GoAgent deployed and restarted"
